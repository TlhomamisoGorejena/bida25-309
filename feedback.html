<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <tittle>AutoLab Enterprise - Feedback</tittle>

        <!-- Bootstrap CSS -->
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

         <!-- AutoLab CSS -->
        <link rel="stylesheet" href= "style.css">
    </head>

    <body>

        <!--
            HEADER & NAVIGATION    
        -->
        <header>
            <div class="logo">
                <img src="images/logo.png" alt="AutoLab Enterprise Logo">
            </div>

            <nav>
                <ul class="d-flex list-unstyled mb-0">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                    <li><a href="=feedback.html">Feedback</a></li>
                </ul>
            </nav>
        </header>


        <!-- FEEDBACK TITTLE PAGE -->
        <h1>Feedback</h1>

        <!-- MAIN CONTENT -->
         <main class="container-fluid">

            <!-- Feedback-form -->
            <section id="feedback-form">
                <div class="row justify-content-center">

                    <div class="col-12 col-md-8">
                        <form action="#" method="post">
                            <h2>Feedback Form</h2>

                            <div class="mb-3"> 
                                <label for="comments">Comments:</label>
                                <textarea id="comments" name="comments" rows="5" 
                                    placeholder="Write you comments here..."></textarea>
                            </div>

                            <button type="submit">Submit Feedback</button>

                        </form>
                    </div>

                </div>
            </section>

        </main>


        <!--
            FOOTER
        -->
        <footer>
            <p>&copy; 2026 AutoLab Enterprise. All rights reserved.</p>
        </footer>

        <!-- Bootstrap JavaScript -->
         <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

         <!-- AutoLab JavaScript -->
        <script src="script.js"></script>

    </body>

</html>
